<style>
*{box-sizing:border-box}
.glass{background:rgba(255,255,255,0.60);backdrop-filter:blur(8px);border:1px solid rgba(0,0,0,0.08);box-shadow:0 2px 12px rgba(0,0,0,0.08);font-family:'Montserrat',Arial,sans-serif;}

/* TITLE */
.tbox{position:fixed;top:14px;left:14px;z-index:1001;border-radius:10px;padding:14px 22px;width:340px;}
.tbox .p3{font-size:10px;font-weight:600;color:#333;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px}
.tbox h1{font-size:14px;font-weight:700;color:#1a1a1a;margin:0;line-height:1.3}
.tbox .stats{font-size:12px;font-weight:600;color:#1a1a1a;margin-top:4px}
.tbox .author{font-size:9px;color:#333;margin-top:3px}
.tbox .crd{font-size:11px;color:#888;margin-top:6px;padding-top:6px;border-top:1px solid rgba(0,0,0,0.06);font-weight:500;height:26px;line-height:26px;overflow:hidden;white-space:nowrap}
.tbox .crd.on{color:#333}
.tlogos{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tlogos img{width:24px;height:24px;border-radius:4px}

/* LEGEND — left side card, slides from left */
.lgnd{position:fixed;left:-196px;z-index:1001;width:210px;border-radius:0 10px 10px 0;padding:0;transition:left 0.3s cubic-bezier(0.4,0,0.2,1);overflow:visible;border-left:none}
.lgnd:not(.open){box-shadow:none;border-color:transparent;background:transparent;backdrop-filter:none}
.lgnd.open{left:0}
.lgnd-handle{position:absolute;right:-28px;top:50%;transform:translateY(-50%);width:28px;height:52px;background:transparent;border:none;border-radius:0 8px 8px 0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lgnd-handle::after{content:'\203A';width:auto;height:auto;background:none;font-size:18px;color:#999;font-weight:700}
.lgnd.open .lgnd-handle::after{content:'\2039';color:#666}
.lgnd-body{padding:12px 14px}
.lgnd-sec{margin-bottom:10px}
.lgnd-sec:last-child{margin-bottom:0}
.lgnd-st{font-size:9px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.lgnd-it{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px;font-weight:500;color:#333;cursor:pointer}
.lgnd-it input{margin:0;accent-color:#555;cursor:pointer}
.lgnd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* SCALEBAR */
#sbar{position:fixed;bottom:28px;left:14px;z-index:1000;border-radius:8px;padding:6px 14px;font-size:10px;color:#555;font-weight:500;transition:bottom 0.35s cubic-bezier(0.4,0,0.2,1)}
#sbar .bar{height:4px;background:#333;border-radius:2px;margin-top:3px;position:relative}
#sbar .bar::before,#sbar .bar::after{content:'';position:absolute;top:-2px;width:1px;height:8px;background:#333}
#sbar .bar::before{left:0} #sbar .bar::after{right:0}

/* BOTTOM SHEET */
.bso{position:fixed;bottom:0;left:0;right:0;z-index:2000;pointer-events:none;transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.25,0.1,0.25,1)}
.bso.open{pointer-events:auto}
.bso.dragging{transition:none!important;-webkit-transition:none!important}
.bss{background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.12);font-family:'Montserrat',sans-serif;max-height:80vh;overflow-y:auto}
.bsh{display:flex;justify-content:center;padding:10px 0 4px;cursor:grab;touch-action:none}.bsh:active{cursor:grabbing}.bsh-b{width:36px;height:4px;background:#d0d0d0;border-radius:2px}
.bshd{display:flex;align-items:stretch;gap:10px;padding:4px 20px 12px;border-bottom:1px solid rgba(0,0,0,0.05)}
.bscb{width:4px;border-radius:2px;flex-shrink:0}
.bsai{width:40px;align-self:stretch;border-radius:6px;object-fit:cover;flex-shrink:0}
.bsti{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.bsti h2{font-size:15px;font-weight:700;color:#1a1a1a;margin:0;line-height:1.3}
.bsbg{display:inline-block;padding:2px 10px;border-radius:8px;font-size:10px;font-weight:700;margin-top:4px;align-self:flex-start}
.bscl{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.04);border:none;font-size:18px;color:#999;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-start;margin-top:2px}
.bscl:hover{background:rgba(0,0,0,0.08);color:#555}
.bsgr{display:grid;grid-template-columns:1fr 1fr}
.bsce{padding:10px 20px;border-bottom:1px solid rgba(0,0,0,0.04)}
.bsce:nth-child(odd){border-right:1px solid rgba(0,0,0,0.04)}
.bslb{font-size:9px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px}
.bsva{font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.3}
.bstr{display:flex;align-items:center;gap:8px;margin-top:2px}
.bstn{font-size:13px;font-weight:600;color:#1a1a1a}
.bswa{display:inline-flex;align-items:center;text-decoration:none}.bswa:hover svg{fill:#1EBE57}
.bsco{padding:8px 20px;font-size:10px;color:#aaa}

/* LEAFLET */
.leaflet-interactive:focus,.leaflet-interactive{outline:none!important}
path.leaflet-interactive:focus{outline:none!important}
.leaflet-tooltip{border-radius:10px!important;border:1px solid rgba(0,0,0,0.06)!important;box-shadow:0 2px 12px rgba(0,0,0,0.1)!important;padding:0!important;overflow:hidden!important;max-width:260px!important;white-space:normal!important}
.leaflet-control-attribution{font-family:'Montserrat',sans-serif!important;font-size:9px!important;background:rgba(255,255,255,0.60)!important;backdrop-filter:blur(8px)!important;padding:3px 10px!important}
.leaflet-control-attribution a{color:#555!important}
.leaflet-control-zoom{position:fixed!important;bottom:76px;left:14px;margin:0!important;z-index:1000;border-radius:8px!important;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08)!important}
.leaflet-control-zoom a{background:rgba(255,255,255,0.60)!important;font-family:'Montserrat',sans-serif!important}
.leaflet-control-scale,.leaflet-control-layers{display:none!important}
.leaflet-top.leaflet-left{top:auto!important}

/* PULSE */

  /* No tooltips on touch/mobile — only bottom sheet */
  @media (hover:none),(pointer:coarse){
    .leaflet-tooltip{display:none!important}
  }

@keyframes pr{0%{transform:scale(1);opacity:.6}70%{transform:scale(2.5);opacity:0}100%{transform:scale(2.5);opacity:0}}
.pm{border-radius:50%;animation:pr 1.5s ease-out infinite;pointer-events:none}

/* RESPONSIVE */
@media(max-width:768px){
  .tbox{left:10px;width:auto;max-width:calc(100% - 60px);padding:10px 16px}
  .tbox h1{font-size:13px}
  .leaflet-control-zoom{left:10px!important}
  #sbar{left:10px!important}
}
@media(max-width:480px){
  .tbox{left:8px;padding:8px 12px;max-width:calc(100% - 50px)}
  .tbox h1{font-size:12px}.tbox .p3{font-size:8px}.tbox .stats{font-size:10px}.tbox .author{font-size:8px}.tbox .crd{font-size:9px}
  .tlogos img{width:18px;height:18px}
  
  .leaflet-control-zoom{left:8px!important;transform:scale(0.85);transform-origin:bottom left}
  #sbar{left:8px!important}
  .lgnd{width:180px;left:-166px}.lgnd:not(.open){box-shadow:none;border-color:transparent;background:transparent;backdrop-filter:none}
.lgnd.open{left:0}
}
